<!DOCTYPE html>

  <title>Offertetool Dennis</title>

    body {font-family: system-ui, sans-serif; margin: 0; padding: 0; background:#f5f5f5;}
    header {background:#111827; color:#fff; padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;}
    header h1 {font-size:1.2rem; margin:0;}
    main {padding:1rem; max-width:1100px; margin:0 auto;}
    .toolbar {display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1rem; align-items:center;}
    select, input[type="text"], input[type="number"] {
      padding:.4rem .5rem; border-radius:.4rem; border:1px solid #d1d5db; font-size:.9rem;
    }
    table {width:100%; border-collapse:collapse; background:#fff; border-radius:.75rem; overflow:hidden;}
    th, td {padding:.35rem .5rem; font-size:.8rem; border-bottom:1px solid #e5e7eb;}
    th {background:#e5e7eb; text-align:left;}
    tr:nth-child(even) td {background:#f9fafb;}
    tr.item-row:hover td {background:#e0f2fe;}
    .right {text-align:right;}
    .badge {display:inline-flex; align-items:center; padding:.1rem .45rem; border-radius:999px; font-size:.7rem; background:#e5e7eb; color:#374151;}
    .totals {margin-top:1rem; max-width:390px; margin-left:auto;}
    .totals-row {display:flex; justify-content:space-between; padding:.25rem 0; font-size:.9rem;}
    .totals-row.total {font-weight:700; border-top:1px solid #d1d5db; margin-top:.25rem; padding-top:.4rem;}
    .chip {display:inline-flex; align-items:center; gap:.3rem; padding:.2rem .5rem; border-radius:999px; font-size:.75rem; border:1px solid #d1d5db; background:#fff;}
    button {
      border:none; border-radius:.5rem; padding:.4rem .8rem; font-size:.8rem; cursor:pointer;
      background:#111827; color:#fff; display:inline-flex; align-items:center; gap:.25rem;
    }
    button.secondary {background:#e5e7eb; color:#111827;}
    button:active {transform:translateY(1px);}
    .pill-toggle {display:inline-flex; border-radius:999px; border:1px solid #d1d5db; overflow:hidden;}
    .pill-toggle button {
      border-radius:0; background:transparent; color:#4b5563; padding:.25rem .75rem;
    }
    .pill-toggle button.active {background:#111827; color:#fff;}

    .offerte-box {
      margin-top:1.5rem;
      background:#fff;
      border-radius:.75rem;
      padding:.75rem;
      border:1px solid #e5e7eb;
    }
    .offerte-box h2 {
      font-size:.95rem;
      margin-top:0;
      margin-bottom:.5rem;
    }

    .offerte-header-inputs {
      display:flex;
      flex-wrap:wrap;
      gap:.5rem;
      margin-bottom:.5rem;
      font-size:.8rem;
    }
    .offerte-header-inputs input {
      flex:1 1 180px;
      min-width:0;
    }

    textarea {
      display:block;
      width:100%;
      min-height:180px;
      border-radius:.5rem;
      border:1px solid #d1d5db;
      padding:.5rem;
      font-family:system-ui, sans-serif;
      font-size:.8rem;
      resize:vertical;
      background:#f9fafb;
      margin-top:.5rem;
    }

    @media (max-width:700px) {
      th:nth-child(3), td:nth-child(3) {display:none;}
      .totals {max-width:100%; margin-left:0;}
    }

    /* PRINT / PDF LAYOUT */
    @media print {
      body { background:#fff; }

      .toolbar,
      .pill-toggle,
      button,
      .offerte-header-inputs {
        display:none !important;
      }

      main {
        max-width:100%;
        padding:0.5rem;
      }

      table {
        font-size:0.75rem;
      }

      .offerte-box textarea {
        min-height:300px;
        border:none;
        background:#fff;
      }
    }
  </style>
</head>

function getEffectivePrice(name, csvPrice) {
  const o = overridePrices[name];
  if (typeof o === "number") {
    return Math.max(csvPrice, o);
  }
  return csvPrice;
}

  category: it.category || "",
  name: it.name,
  unit: it.unit,
  priceCsv: it.priceCsv,
  price: getEffectivePrice(it.name, it.priceCsv),
  qty: 0,
}));

  for (const it of items) {
    if (activeFilter === "STRAATWERK" && it.category !== "STRAATWERK") continue;
    if (activeFilter === "GRONDWERK" && it.category !== "GRONDWERK") continue;
    if (activeFilter === "PVC" && it.category !== "PVC") continue;
    if (activeFilter === "CONTAINERS" && !it.category.toUpperCase().includes("CONTAINER")) continue;
    if (activeFilter === "VERHUUR" && it.category !== "VERHUUR") continue;
    if (activeFilter === "OVERIG" && it.category !== "OVERIG") continue;

    if (term && !it.name.toLowerCase().includes(term)) continue;

    const tr = document.createElement("tr");
    tr.className = "item-row";

    const tdCat = document.createElement("td");
    tdCat.textContent = it.category || "-";

    const tdName = document.createElement("td");
    tdName.textContent = it.name;

    const tdUnit = document.createElement("td");
    tdUnit.textContent = it.unit || "";

    const tdPrice = document.createElement("td");
    tdPrice.className = "right";
    tdPrice.textContent = formatEuro(it.price);

    const tdQty = document.createElement("td");
    tdQty.className = "right";
    const inp = document.createElement("input");
    inp.type = "number";
    inp.min = "0";
    inp.step = "0.01";
    inp.value = it.qty || "";
    inp.style.width = "70px";
    inp.addEventListener("input", () => {
      it.qty = parseFloat(inp.value.replace(",", ".")) || 0;
      const lineTotal = (it.qty || 0) * it.price;
      tdTotal.textContent = lineTotal ? formatEuro(lineTotal) : "€0,00";
      updateTotals();
    });
    tdQty.appendChild(inp);

    const tdTotal = document.createElement("td");
    tdTotal.className = "right";
    const lineTotal = (it.qty || 0) * it.price;
    tdTotal.textContent = lineTotal ? formatEuro(lineTotal) : "€0,00";

    tr.appendChild(tdCat);
    tr.appendChild(tdName);
    tr.appendChild(tdUnit);
    tr.appendChild(tdPrice);
    tr.appendChild(tdQty);
    tr.appendChild(tdTotal);

    bodyEl.appendChild(tr);
  }
}

function calculateTotals() {
  let subtotal = 0;
  for (const it of items) {
    if (!it.qty) continue;
    subtotal += it.qty * it.price;
  }
  if (voorrijToggle.checked) {
    subtotal += 65;
  }
  const btw = subtotal * 0.21;
  const incl = subtotal + btw;
  return { subtotal, btw, incl };
}

function updateTotals() {
  const t = calculateTotals();
  document.getElementById("subExcl").textContent = formatEuro(t.subtotal);
  document.getElementById("btw").textContent = formatEuro(t.btw);
  document.getElementById("totalIncl").textContent = formatEuro(t.incl);
}

searchInput.addEventListener("input", () => { renderRows(); });
voorrijToggle.addEventListener("change", () => { updateTotals(); });

// Filter-knoppen
const allBtn = document.getElementById("allBtn");
const straatwerkBtn = document.getElementById("straatwerkBtn");
const grondwerkBtn = document.getElementById("grondwerkBtn");
const pvcBtn = document.getElementById("pvcBtn");
const containersBtn = document.getElementById("containersBtn");
const verhuurBtn = document.getElementById("verhuurBtn");
const overigBtn = document.getElementById("overigBtn");

function setFilter(filter) {
  activeFilter = filter;
  for (const btn of [allBtn, straatwerkBtn, grondwerkBtn, pvcBtn, containersBtn, verhuurBtn, overigBtn]) {
    btn.classList.remove("active");
  }
  if (filter === "ALL") allBtn.classList.add("active");
  if (filter === "STRAATWERK") straatwerkBtn.classList.add("active");
  if (filter === "GRONDWERK") grondwerkBtn.classList.add("active");
  if (filter === "PVC") pvcBtn.classList.add("active");
  if (filter === "CONTAINERS") containersBtn.classList.add("active");
  if (filter === "VERHUUR") verhuurBtn.classList.add("active");
  if (filter === "OVERIG") overigBtn.classList.add("active");
  renderRows();
}

allBtn.addEventListener("click", () => setFilter("ALL"));
straatwerkBtn.addEventListener("click", () => setFilter("STRAATWERK"));
grondwerkBtn.addEventListener("click", () => setFilter("GRONDWERK"));
pvcBtn.addEventListener("click", () => setFilter("PVC"));
containersBtn.addEventListener("click", () => setFilter("CONTAINERS"));
verhuurBtn.addEventListener("click", () => setFilter("VERHUUR"));
overigBtn.addEventListener("click", () => setFilter("OVERIG"));

// Offertetekst generator
document.getElementById("genTextBtn").addEventListener("click", () => {
  const t = calculateTotals();
  const regels = [];

  const klant = klantNaamInput.value.trim();
  const project = projectNaamInput.value.trim();
  const plaatsDatum = plaatsDatumInput.value.trim();

  if (plaatsDatum) {
    regels.push(plaatsDatum);
    regels.push("");
  }

  if (klant) {
    regels.push("Geachte " + klant + ",");
  } else {
    regels.push("Geachte heer/mevrouw,");
  }

  regels.push("");
  regels.push("Hartelijk dank voor uw aanvraag.");
  regels.push("Hierbij ontvangt u onze offerte voor het uitvoeren van de onderstaande werkzaamheden:");
  regels.push("");

  if (project) {
    regels.push(project);
    regels.push("");
  }

  regels.push("Werkzaamheden:");
  
  for (const it of items) {
    if (!it.qty) continue;
    const lineTotal = it.qty * it.price;
    const eenh = it.unit ? " " + it.unit : "";
    regels.push("• " + it.qty.toString().replace(".", ",") + eenh + " " + it.name + " à " + formatEuro(it.price) + " = " + formatEuro(lineTotal));
  }

  if (voorrijToggle.checked) {
    regels.push("• 1x Voorrijkosten per klus = " + formatEuro(65));
  }

  regels.push("");
  regels.push("Subtotaal (excl. btw): " + formatEuro(t.subtotal));
  regels.push("BTW 21%: " + formatEuro(t.btw));
  regels.push("Totaal (incl. btw): " + formatEuro(t.incl));
  regels.push("");
  regels.push("Prijzen zijn vermeld exclusief eventuele meerwerkzaamheden.");
  regels.push("");
  regels.push("Met vriendelijke groet,");
  regels.push("Dennis van den Akker");
  regels.push("D van den Akker bestrating");

  offerteText.value = regels.join("\n");
});

document.getElementById("selectTextBtn").addEventListener("click", () => {
  offerteText.focus();
  offerteText.select();
});

renderRows();
updateTotals();
</script>
</body>
</html>
